name: Golden Dataset Regression

# Sprint 5 · blocks any PR that drifts the seed away from content/golden-dataset.json.
#
# Local equivalent: `npm run test -- tests/unit/golden-dataset.test.ts`
# Maintainer flow when this fails:
#   (a) update the seed in src/registry/seed/* to match the golden anchor, OR
#   (b) update content/golden-dataset.json with a rationale + new review date
#       (requires reviewer signature in the JSON's last_reviewer field).
# Either branch must land in the same PR as the drift.

on:
  pull_request:
    paths:
      - "src/registry/seed/**"
      - "content/golden-dataset.json"
      - "src/lib/golden-dataset.ts"
      - "tests/unit/golden-dataset.test.ts"
  workflow_dispatch: {}

jobs:
  golden-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run golden-dataset regression tests
        run: npx vitest run tests/unit/golden-dataset.test.ts

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
